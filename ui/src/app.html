<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weir</title>
    <script>
      // Stamp the theme before first paint so there's no light→dark flash. A saved choice wins;
      // otherwise follow the OS. The theme toggle in the layout updates the same attribute + key.
      // Storage access can throw in locked-down webviews/privacy modes — never let that block render.
      (function () {
        try {
          var saved = localStorage.getItem('weir-theme');
          document.documentElement.dataset.theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app">%sveltekit.body%</div>
  </body>
</html>
